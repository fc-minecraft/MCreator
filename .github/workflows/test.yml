name: Build, Test and Release

permissions:
  contents: write
  checks: write
  statuses: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  # 1. SETUP: Tagging logic
  setup:
    name: Prepare Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      tag_name: ${{ steps.release_info.outputs.tag_name }}
      title: ${{ steps.release_info.outputs.title }}
      prerelease: ${{ steps.release_info.outputs.prerelease }}
      is_snapshot: ${{ steps.release_info.outputs.is_snapshot }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine Release Info
        id: release_info
        run: |
          if [[ "${{ github.event.head_commit.message }}" == *"release"* ]]; then
            echo "tag_name=release-${{ github.run_number }}" >> $GITHUB_OUTPUT
            echo "title=Production Release #${{ github.run_number }}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "is_snapshot=false" >> $GITHUB_OUTPUT
          else
            echo "tag_name=pre-release" >> $GITHUB_OUTPUT
            echo "title=Development Build (Latest)" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "is_snapshot=true" >> $GITHUB_OUTPUT
          fi

      - name: Reset Pre-release Tag
        if: steps.release_info.outputs.prerelease == 'true'
        continue-on-error: true
        run: |
          git push --delete origin pre-release || true
          git tag -d pre-release || true

  # 2. BUILD MATRIX
  build-and-release:
    name: Build ${{ matrix.target }}
    needs: [setup]
    if: always() && (needs.setup.result == 'success' || github.event_name == 'pull_request')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: Linux
            gradle_task: exportLinux
          - os: ubuntu-latest
            target: Windows
            gradle_task: exportWindows
          - os: macos-latest
            target: macOS
            gradle_task: exportMac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      # Dependencies for Windows build (running on Ubuntu)
      - name: Install Windows Build Deps
        if: matrix.target == 'Windows'
        run: |
          sudo apt-get update
          sudo apt-get install -y mkisofs nsis nsis-pluginapi
          wget -q https://nsis.sourceforge.io/mediawiki/images/d/d3/LockedList.zip
          sudo unzip -o -q LockedList.zip -d /usr/share/nsis/

      # Dependencies for macOS build
      - name: Install macOS Build Deps
        if: matrix.target == 'macOS'
        run: brew install create-dmg

      # BUILD STEP
      - name: Build and Export
        env:
          # Assuming you don't want to fail if secrets are missing during dev builds
          # Add signing secrets here if strictly required
          SNAPSHOT: ${{ needs.setup.outputs.is_snapshot }}
        run: |
          ARGS="assemble test ${{ matrix.gradle_task }} --parallel --build-cache --configure-on-demand -Dorg.gradle.jvmargs=-Xmx3g"
          
          if [[ "$SNAPSHOT" == "true" ]]; then
            ARGS="$ARGS -Psnapshot=true"
          fi
          
          # Use xvfb only on Linux runner (for both Linux and Windows builds)
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            xvfb-run -a ./gradlew $ARGS
          else
            ./gradlew $ARGS
          fi

      # Upload Artifacts (Only on Push)
      - name: Upload Assets to Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.tag_name }}
          name: ${{ needs.setup.outputs.title }}
          body: |
            Build commit: ${{ github.sha }}
            Target: ${{ matrix.target }}
          prerelease: ${{ needs.setup.outputs.prerelease }}
          files: |
            build/export/*
            build/distributions/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}