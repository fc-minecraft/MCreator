name: Build, Test and Release

permissions:
  contents: write
  checks: write
  statuses: write

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  # 1. SETUP: Быстро определяем версию и чистим старые теги
  setup:
    name: Prepare Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' # Запускаем только на push, не на PR
    outputs:
      tag_name: ${{ steps.release_info.outputs.tag_name }}
      title: ${{ steps.release_info.outputs.title }}
      prerelease: ${{ steps.release_info.outputs.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine Release Info
        id: release_info
        run: |
          if [[ "${{ github.event.head_commit.message }}" == *"release"* ]]; then
            echo "tag_name=release-${{ github.run_number }}" >> $GITHUB_OUTPUT
            echo "title=Production Release #${{ github.run_number }}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "tag_name=pre-release" >> $GITHUB_OUTPUT
            echo "title=Development Build (Latest)" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

      - name: Reset Pre-release Tag
        # Если это пре-релиз, удаляем старый тег, чтобы пересоздать его на новом коммите
        if: steps.release_info.outputs.prerelease == 'true'
        continue-on-error: true
        run: |
          git push --delete origin pre-release || true
          git tag -d pre-release || true

  # 2. BUILD MATRIX: Собираем на 3 системах параллельно
  build-and-release:
    name: Build on ${{ matrix.os }}
    needs: [setup] # Ждем завершения setup, чтобы не было конфликтов с тегами
    if: always() && (needs.setup.result == 'success' || github.event_name == 'pull_request')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # Если одна ОС упала, остальные продолжают
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Кэш отдельно для каждой ОС, запись только на мастере
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      # Linux Build
      - name: Build (Linux)
        if: runner.os == 'Linux'
        # Добавь 'jpackage' если настроен плагин. Используем assemble для скорости сборки бинарников.
        run: xvfb-run -a ./gradlew assemble test jpackage --parallel --build-cache --configure-on-demand

      # Windows Build
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: ./gradlew assemble test jpackage --parallel --build-cache --configure-on-demand

      # macOS Build
      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: ./gradlew assemble test jpackage --parallel --build-cache --configure-on-demand

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v5
        if: always() # Собираем отчеты даже если тесты упали
        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'
          require_tests: true

      # Загрузка файлов в релиз (только для PUSH)
      - name: Upload Assets to Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          # Берем имя тега из предыдущей джобы (setup)
          tag_name: ${{ needs.setup.outputs.tag_name }}
          name: ${{ needs.setup.outputs.title }}
          body: |
            Build commit: ${{ github.sha }}
            Platform: ${{ matrix.os }}
          prerelease: ${{ needs.setup.outputs.prerelease }}
          # Ищем все возможные типы установщиков
          files: |
            build/libs/*.jar
            build/distributions/*.zip
            build/distributions/*.tar
            build/**/jpackage/*.exe
            build/**/jpackage/*.msi
            build/**/jpackage/*.dmg
            build/**/jpackage/*.pkg
            build/**/jpackage/*.deb
            build/**/jpackage/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
